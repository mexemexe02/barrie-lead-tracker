<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker — Barrie Demo Drop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px;min-height:100vh}
h1{font-size:1.8rem;margin-bottom:4px}
.subtitle{color:#94a3b8;margin-bottom:24px;font-size:.9rem}
.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat-card{background:#1e293b;padding:16px 24px;border-radius:12px;min-width:110px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:800}
.stat-card .label{font-size:.75rem;color:#94a3b8;text-transform:uppercase}
.stat-card.sent .num{color:#38bdf8}
.stat-card.replied .num{color:#fbbf24}
.stat-card.interested .num{color:#4ade80}
.stat-card.closed .num{color:#f87171}
.table-wrap{overflow-x:auto;background:#1e293b;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:12px 16px;background:#334155;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid #334155;white-space:nowrap}
tr:hover{background:rgba(255,255,255,.03)}
.status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:uppercase}
.status.pending{background:#334155;color:#94a3b8}
.status.sent{background:#0c4a6e;color:#38bdf8}
.status.replied{background:#713f12;color:#fbbf24}
.status.interested{background:#14532d;color:#4ade80}
.status.closed{background:#7f1d1d;color:#fca5a5}
a{color:#38bdf8;text-decoration:none}
a:hover{text-decoration:underline}
.url{font-family:monospace;font-size:.78rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px}
.btn{padding:10px 20px;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:all .2s}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8}
.btn-outline{background:transparent;border:1px solid #475569;color:#e2e8f0}
.btn-outline:hover{border-color:#94a3b8}
.refresh{text-align:right;color:#64748b;font-size:.75rem;margin-bottom:8px}
</style>
</head>
<body>
<h1>🎯 Barrie Demo Drop</h1>
<p class="subtitle">Lead Tracker — 6 businesses found, demos built & deployed</p>

<div class="stats" id="stats"></div>

<div class="table-wrap">
  <div class="refresh">Last updated: <span id="updated"></span></div>
  <table>
    <thead><tr><th>Business</th><th>Category</th><th>Contact</th><th>Demo URL</th><th>Outreach</th><th>Status</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="actions">
  <button class="btn btn-blue" onclick="location.reload()">🔄 Refresh</button>
  <button class="btn btn-outline" onclick="window.open('../leads.csv')">📥 Download CSV</button>
</div>

<script>
const LEADS = [
  {biz:"Pacheco Mobile Mechanic",cat:"Auto Repair",phone:"(705) 229-0694",email:"",url:"http://b12f6ruz0z3vlidk4pj1c344.178.156.135.237.sslip.io",outreach:"📱 Text",status:"pending"},
  {biz:"Carmen's Maid Service",cat:"Cleaning",phone:"(705) 734-1118",email:"",url:"http://vbc05q9ireu4i6re7hogzsfh.178.156.135.237.sslip.io",outreach:"📱 Text",status:"pending"},
  {biz:"Pawfection Grooming",cat:"Dog Grooming",phone:"(705) 734-3647",email:"pawfection@hotmail.ca",url:"http://cs5cvtxl9wmrbjj2pi963t49.178.156.135.237.sslip.io",outreach:"✉️ Email",status:"sent"},
  {biz:"Pawtricia's Grooming",cat:"Dog & Cat Grooming",phone:"(416) 857-5300",email:"pawtricias.dog.grooming@gmail.com",url:"http://e9rgxg22dizdm4ptfglth6f8.178.156.135.237.sslip.io",outreach:"✉️ Email",status:"sent"},
  {biz:"Fitness with Olga",cat:"Personal Training",phone:"",email:"",extra:"@FitnessTrainingBarrie",url:"http://zrga8reyjutehuhwaeyx71k9.178.156.135.237.sslip.io",outreach:"💬 Facebook",status:"pending"},
  {biz:"Blanchettes Services",cat:"Handyman",phone:"(705) 903-8423",email:"",url:"http://oct6w22w1cigj8aeq2vw6q3c.178.156.135.237.sslip.io",outreach:"📱 Text",status:"pending"},
];

const statusCounts = {pending:0,sent:0,replied:0,interested:0,closed:0};
let tbody = '';
LEADS.forEach(l => {
  statusCounts[l.status] = (statusCounts[l.status]||0) + 1;
  let contact = l.phone || l.email || l.extra || '—';
  tbody += `<tr>
    <td><strong>${l.biz}</strong></td>
    <td>${l.cat}</td>
    <td>${contact}</td>
    <td><a href="${l.url}" target="_blank" class="url">${l.url.split('//')[1].split('.')[0]}...</a></td>
    <td>${l.outreach}</td>
    <td><span class="status ${l.status}">${l.status}</span></td>
  </tr>`;
});
document.getElementById('tableBody').innerHTML = tbody;

const colors = {pending:'#94a3b8',sent:'#38bdf8',replied:'#fbbf24',interested:'#4ade80',closed:'#f87171'};
document.getElementById('stats').innerHTML = Object.entries(statusCounts).map(([k,v]) =>
  `<div class="stat-card ${k}"><div class="num" style="color:${colors[k]}">${v}</div><div class="label">${k}</div></div>`
).join('');

document.getElementById('updated').textContent = new Date().toLocaleString();
</script>
</body>
</html>
